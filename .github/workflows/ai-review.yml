on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]
  issue_comment:
    types: [created]

jobs:
  review:
    uses: DataDog/code-review-action/.github/workflows/code-review.yml@4f91dd0cb903cdb1866fe99108231e0ee6e138e0
    with:
      provider:      codex
      trigger_mode:  on_demand
      review_event:  COMMENT_ONLY
      prompt_file:   prompt.md
    secrets:
      openai_api_key: ${{ secrets.OPENAI_API_KEY }}
